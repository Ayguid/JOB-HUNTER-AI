<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Job Hunter Dashboard</title>
<style>
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; margin: 0; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #333; font-size: 14px; }
    th { color: #888; font-weight: 600; position: sticky; top: 0; background: #111; }
    tr:hover { background: #1a1a1a; }
    .score { font-weight: bold; color: #4ade80; }
    .tags { color: #888; font-size: 12px; }
    .tag { display: inline-block; background: #222; border-radius: 4px; padding: 2px 6px; margin: 2px 2px 0 0; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
    #loading { color: #888; }
    .pagination { margin-top: 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .pagination button { background: #222; color: #eee; border: 1px solid #444; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
    .pagination button:hover:not(:disabled) { background: #333; }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination .info { color: #888; font-size: 14px; }
    .pagination select { background: #222; color: #eee; border: 1px solid #444; padding: 6px; border-radius: 4px; }
</style>
</head>
<body>

<h1>Job Hunter — Resultados</h1>
<div id="loading">Cargando...</div>
<table id="jobs-table" style="display:none">
    <thead>
        <tr>
            <th>Score</th>
            <th>Título</th>
            <th>Empresa</th>
            <th>Ubicación</th>
            <th>Tags</th>
        </tr>
    </thead>
    <tbody id="jobs-body"></tbody>
</table>

<div id="pagination-container" style="display:none" class="pagination">
    <button id="prev-btn" disabled>Anterior</button>
    <span class="info" id="page-info">Página 1 de 1</span>
    <button id="next-btn" disabled>Siguiente</button>
    <span class="info">Mostrar:</span>
    <select id="limit-select">
        <option value="20">20</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="200">200</option>
    </select>
</div>

<script>
let currentPage = 1;
let currentLimit = 50;
let totalPages = 1;

const loading = document.getElementById("loading");
const table = document.getElementById("jobs-table");
const body = document.getElementById("jobs-body");
const paginationContainer = document.getElementById("pagination-container");
const prevBtn = document.getElementById("prev-btn");
const nextBtn = document.getElementById("next-btn");
const pageInfo = document.getElementById("page-info");
const limitSelect = document.getElementById("limit-select");

function loadJobs(page, limit) {
    loading.style.display = "block";
    table.style.display = "none";
    paginationContainer.style.display = "none";
    body.innerHTML = "";

    fetch(`/api/jobs?page=${page}&limit=${limit}`)
        .then(res => res.json())
        .then(response => {
            const { data, pagination } = response;
            currentPage = pagination.page;
            currentLimit = pagination.limit;
            totalPages = pagination.totalPages;

            for (const job of data) {
                const tags = job.reasons
                    .sort((a, b) => b.points - a.points)
                    .map(r => `<span class="tag">${r.tag} +${r.points}</span>`)
                    .join(" ");

                const row = document.createElement("tr");
                row.innerHTML = `
                    <td class="score">${job.score}</td>
                    <td><a href="${job.url}" target="_blank">${job.title}</a></td>
                    <td>${job.company}</td>
                    <td>${job.location}</td>
                    <td class="tags">${tags}</td>
                `;
                body.appendChild(row);
            }

            loading.style.display = "none";
            table.style.display = "table";
            paginationContainer.style.display = "flex";
            updatePagination();
        })
        .catch(err => {
            loading.textContent = "Error cargando jobs: " + err.message;
        });
}

function updatePagination() {
    pageInfo.textContent = `Página ${currentPage} de ${totalPages}`;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
}

prevBtn.addEventListener("click", () => {
    if (currentPage > 1) loadJobs(currentPage - 1, currentLimit);
});

nextBtn.addEventListener("click", () => {
    if (currentPage < totalPages) loadJobs(currentPage + 1, currentLimit);
});

limitSelect.addEventListener("change", () => {
    loadJobs(1, parseInt(limitSelect.value));
});

// Carga inicial
loadJobs(1, 50);
</script>

</body>
</html>
